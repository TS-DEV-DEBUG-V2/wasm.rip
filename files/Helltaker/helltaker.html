<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/larpinguser/HellTaker-Web@c29f7ca6696f71505efbaabf15f5e4d77bf3a49c/helltakerweb/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Helltaker</title>
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/larpinguser/Helltaker-Web@c29f7ca6696f71505efbaabf15f5e4d77bf3a49c/helltakerweb/TemplateData/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/larpinguser/Helltaker-Web@c29f7ca6696f71505efbaabf15f5e4d77bf3a49c/helltakerweb/TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Helltaker</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      const baseUrl = "https://cdn.jsdelivr.net/gh/larpinguser/Helltaker-Web@c29f7ca6696f71505efbaabf15f5e4d77bf3a49c/helltakerweb/Build/";
      
      async function fetchAndMerge(urls) {
        const responses = await Promise.all(urls.map(url => fetch(url)));
        const blobs = await Promise.all(responses.map(res => res.blob()));
        return URL.createObjectURL(new Blob(blobs));
      }

      async function init() {
        const dataUrl = await fetchAndMerge([
          baseUrl + "helltakerweb.data.part1",
          baseUrl + "helltakerweb.data.part2",
          baseUrl + "helltakerweb.data.part3"
        ]);

        const wasmUrl = await fetchAndMerge([
          baseUrl + "helltakerweb.wasm.part1",
          baseUrl + "helltakerweb.wasm.part2",
          baseUrl + "helltakerweb.wasm.part3"
        ]);

        var config = {
          dataUrl: dataUrl,
          frameworkUrl: baseUrl + "helltakerweb.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "vanripper",
          productName: "Helltaker",
          productVersion: "ex1.1",
          showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
          container.className = "unity-mobile";
          canvas.className = "unity-mobile";
        } else {
          canvas.style.width = "960px";
          canvas.style.height = "600px";
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = baseUrl + "helltakerweb.loader.js";
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      init();
    </script>
  </body>
</html>
